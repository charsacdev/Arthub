<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>New Password — TokenPixelBay Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-login-page">

<div class="login-wrap">
  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">◈</div>
    <span class="login-logo-text">TokenPixelBay</span>
    <span class="login-logo-badge">Admin</span>
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="login-title">Set New Password</div>
    <div class="login-sub">Create a strong password for your administrator account.</div>

    <!-- Error alert -->
    <div class="login-error" id="reset-error">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="reset-error-msg"></span>
    </div>

    <form id="reset-form" novalidate>
      <!-- Password -->
      <div class="fg">
        <label class="fl" for="password">New Password</label>
        <div class="fi-wrap">
          <span class="fi-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </span>
          <input class="fi" id="password" type="password" placeholder="••••••••" autocomplete="new-password"/>
          <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
            <svg id="pw-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="fi-msg" id="pw-msg"></div>
      </div>

      <!-- Confirm Password -->
      <div class="fg">
        <label class="fl" for="confirm-password">Confirm Password</label>
        <div class="fi-wrap">
          <span class="fi-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </span>
          <input class="fi" id="confirm-password" type="password" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <div class="fi-msg" id="confirm-msg"></div>
      </div>

      <button type="submit" class="btn-login" id="submit-btn">
        <span id="btn-text">Update Password</span>
        <div class="spin" id="btn-spin" style="display:none;"></div>
      </button>
    </form>
  </div>

  <a href="login.html" class="back-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Login
  </a>
</div>

<script src="js/admin-reset-password.js"></script>
</body>
</html>
