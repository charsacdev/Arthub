<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — TokenPixelBay Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-login-page">

<div class="login-wrap">
  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">◈</div>
    <span class="login-logo-text">TokenPixelBay</span>
    <span class="login-logo-badge">Admin</span>
  </div>

  <!-- Card -->
  <div class="login-card">
    <!-- Step 1: Request OTP -->
    <div id="forgot-step-email">
      <div class="login-title">Forgot Password?</div>
      <div class="login-sub">Enter your administrator email to receive a recovery code.</div>

      <!-- Error alert -->
      <div class="login-error" id="login-error">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="login-error-msg"></span>
      </div>

      <form id="forgot-form" novalidate>
        <!-- Email -->
        <div class="fg">
          <label class="fl" for="email">Admin Email Address</label>
          <div class="fi-wrap">
            <span class="fi-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="fi" id="email" type="email" placeholder="admin@tokenpixelbay.com" autocomplete="email"/>
          </div>
          <div class="fi-msg" id="email-msg"></div>
        </div>

        <button type="submit" class="btn-login" id="submit-btn">
          <span id="btn-text">Send Recovery Code</span>
          <div class="spin" id="btn-spin" style="display:none;"></div>
        </button>
      </form>
    </div>

    <!-- Step 2: OTP verification -->
    <div id="forgot-step-otp" style="display:none;">
      <div class="login-title">Enter Verification Code</div>
      <div class="login-sub">We sent a 6-digit verification code to your email. Enter it below to proceed.</div>

      <div class="login-error" id="otp-error">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="otp-error-msg"></span>
      </div>

      <div style="display:flex;gap:10px;justify-content:center;margin:24px 0 16px;">
        <input class="fi otp-box" type="text" maxlength="1" style="width:40px;height:45px;text-align:center;font-size:1.2rem;font-weight:700;padding:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:8px;" inputmode="numeric"/>
        <input class="fi otp-box" type="text" maxlength="1" style="width:40px;height:45px;text-align:center;font-size:1.2rem;font-weight:700;padding:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:8px;" inputmode="numeric"/>
        <input class="fi otp-box" type="text" maxlength="1" style="width:40px;height:45px;text-align:center;font-size:1.2rem;font-weight:700;padding:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:8px;" inputmode="numeric"/>
        <input class="fi otp-box" type="text" maxlength="1" style="width:40px;height:45px;text-align:center;font-size:1.2rem;font-weight:700;padding:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:8px;" inputmode="numeric"/>
        <input class="fi otp-box" type="text" maxlength="1" style="width:40px;height:45px;text-align:center;font-size:1.2rem;font-weight:700;padding:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:8px;" inputmode="numeric"/>
        <input class="fi otp-box" type="text" maxlength="1" style="width:40px;height:45px;text-align:center;font-size:1.2rem;font-weight:700;padding:5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:8px;" inputmode="numeric"/>
      </div>

      <button onclick="verifyOTP()" class="btn-login" id="verify-btn">
        <span>Verify Code</span>
      </button>

      <div style="text-align:center;font-size:.78rem;color:var(--text-3);margin-top:16px;">
        Didn't get code? <button onclick="resendCode()" style="background:none;border:none;color:var(--accent);cursor:pointer;padding:0;text-decoration:underline;font-family:inherit;">Resend code</button>
      </div>
    </div>
  </div>

  <a href="login.html" class="back-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Login
  </a>
</div>

<script src="js/admin-forgot-password.js"></script>
</body>
</html>
