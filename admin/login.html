<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — MetaVault</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-login-page">

<div class="login-wrap">
  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">◈</div>
    <span class="login-logo-text">MetaVault</span>
    <span class="login-logo-badge">Admin</span>
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="login-title">Administrator Access</div>
    <div class="login-sub">Sign in with your admin credentials to continue</div>

    <!-- Error alert -->
    <div class="login-error" id="login-error">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="login-error-msg">Invalid credentials. Please try again.</span>
    </div>

    <form id="login-form" novalidate>
      <!-- Email -->
      <div class="fg">
        <label class="fl" for="email">Email Address</label>
        <div class="fi-wrap">
          <span class="fi-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input class="fi" id="email" type="email" placeholder="admin@metavault.io" autocomplete="email"/>
        </div>
        <div class="fi-msg" id="email-msg"></div>
      </div>

      <!-- Password -->
      <div class="fg">
        <label class="fl" for="password">Password</label>
        <div class="fi-wrap">
          <span class="fi-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </span>
          <input class="fi" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
            <svg id="pw-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="fi-msg" id="pw-msg"></div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <span id="btn-text">Sign In to Admin Panel</span>
        <div class="spin" id="btn-spin" style="display:none;"></div>
      </button>
    </form>

    <!-- Demo credentials -->
    <div class="demo-hint">
      <div class="demo-hint-label">Demo Credentials</div>
      <div class="demo-row">
        <span class="demo-key">Email</span>
        <span class="demo-val">admin@metavault.io</span>
      </div>
      <div class="demo-row">
        <span class="demo-key">Password</span>
        <span class="demo-val">admin123</span>
      </div>
      <button class="btn-demo" onclick="fillDemo()">Fill Demo Credentials</button>
    </div>
  </div>

  <a href="../index.html" class="back-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Marketplace
  </a>
</div>

<script src="js/admin-login.js"></script>
</body>
</html>
